name: Pytest

on:
  push:
    branches: [main]
    tags-ignore:
      - '**'
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - name: Install ruff
        run: uv tool install ruff@0.15.10
      - name: Run ruff
        run: ruff check citrasense/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
      - name: Install project prerequisites
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libdbus-1-dev libjpeg-dev zlib1g-dev
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pyright
        run: uv run pyright

  test:
    # Matrix covers x86_64 across all supported python versions, plus a single
    # arm64 leg on py3.12 (the prod Pi version). The arm64 leg exists to catch
    # native-extension behavior skews that don't surface on x86_64 — the
    # motivating case is issue #300, where skyfield/sgp4 silently NaN'd on
    # SGP4-XP TLEs *only* on linux/aarch64. ``ubuntu-24.04-arm`` is a free
    # GitHub-hosted runner for public repos.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
        include:
          - os: ubuntu-24.04-arm
            python-version: '3.12'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project prerequisites
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libdbus-1-dev libjpeg-dev zlib1g-dev
      - name: Install dependencies
        run: |
          if ! uv sync --extra dev --extra test --extra indi --extra all; then
            echo "::warning::pyindi-client has no wheel for Python ${{ matrix.python-version }} on ${{ matrix.os }} — installing without indi/all extras"
            uv sync --extra dev --extra test
          fi
      - name: Run pytest with coverage
        run: |
          uv run pytest -m "not integration" --import-mode=importlib --override-ini="addopts=" --cov=citrasense --cov-report=term-missing --cov-report=xml --cov-branch
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml
