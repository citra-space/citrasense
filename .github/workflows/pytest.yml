name: Pytest

on:
  push:
    branches: [main]
    tags-ignore:
      - '**'
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Install ruff
        run: uv tool install ruff@0.15.10
      - name: Run ruff
        run: ruff check citrascope/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: '3.12'
      - name: Install project prerequisites
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libdbus-1-dev libjpeg-dev zlib1g-dev
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run pyright
        run: uv run pyright

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project prerequisites
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev libdbus-1-dev libjpeg-dev zlib1g-dev swig libindi-dev
      - name: Install dependencies
        run: uv sync --extra dev --extra test --extra indi --extra all
      - name: Run pytest with coverage
        run: |
          uv run pytest -m "not integration" --import-mode=importlib --override-ini="addopts=" --cov=citrascope --cov-report=term-missing --cov-report=xml --cov-branch
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.12'
        with:
          name: coverage-xml
          path: coverage.xml
