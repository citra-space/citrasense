    <!-- Roll-up Terminal Overlay as Bootstrap Accordion -->
    <div class="position-fixed bottom-0 start-0 w-100 z-3" style="max-width: 100vw;">
        <div class="accordion" id="logAccordion">
            <div class="accordion-item bg-dark text-light border-secondary">
                <h2 class="accordion-header" id="logAccordionHeader">
                    <button class="accordion-button collapsed bg-secondary text-light log-accordion-button" type="button"
                        data-bs-toggle="collapse" data-bs-target="#logAccordionCollapse" aria-expanded="false"
                        aria-controls="logAccordionCollapse">
                        <span class="log-latest-line">
                            <template x-if="!$store.citrasense.latestLog">
                                <span>Log Terminal</span>
                            </template>
                            <template x-if="$store.citrasense.latestLog">
                                <span>
                                    <span class="log-timestamp" x-text="new Date($store.citrasense.latestLog.timestamp).toLocaleTimeString()"></span>
                                    <span class="log-level" :class="'log-level-' + $store.citrasense.latestLog.level" x-text="$store.citrasense.latestLog.level"></span>
                                    <span x-text="$store.citrasense.stripAnsiCodes($store.citrasense.latestLog.message) || ''"></span>
                                </span>
                            </template>
                        </span>
                        <div class="accordion-social-links">
                            <a href="https://github.com/citra-space/citrasense/issues/new" target="_blank" class="social-link" title="Report an Issue" onclick="event.stopPropagation();">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M16 8c0 3.866-3.582 7-8 7a9 9 0 0 1-2.347-.306c-.584.296-1.925.864-4.181 1.234-.2.032-.352-.176-.273-.362.354-.836.674-1.95.77-2.966C.744 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7M5 8a1 1 0 1 0-2 0 1 1 0 0 0 2 0m4 0a1 1 0 1 0-2 0 1 1 0 0 0 2 0m3 1a1 1 0 1 0 0-2 1 1 0 0 0 0 2"/>
                                </svg>
                            </a>
                            <a href="https://discord.gg/STgJQkWe9y" target="_blank" class="social-link" title="Join Discord" onclick="event.stopPropagation();">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M13.545 2.907a13.227 13.227 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.19 12.19 0 0 0-3.658 0 8.258 8.258 0 0 0-.412-.833.051.051 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.041.041 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032c.001.014.01.028.021.037a13.276 13.276 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019c.308-.42.582-.863.818-1.329a.05.05 0 0 0-.01-.059.051.051 0 0 0-.018-.011 8.875 8.875 0 0 1-1.248-.595.05.05 0 0 1-.02-.066.051.051 0 0 1 .015-.019c.084-.063.168-.129.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.052.052 0 0 1 .053.007c.08.066.164.132.248.195a.051.051 0 0 1-.004.085 8.254 8.254 0 0 1-1.249.594.05.05 0 0 0-.03.03.052.052 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.235 13.235 0 0 0 4.001-2.02.049.049 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.034.034 0 0 0-.02-.019Zm-8.198 7.307c-.789 0-1.438-.724-1.438-1.612 0-.889.637-1.613 1.438-1.613.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612Zm5.316 0c-.788 0-1.438-.724-1.438-1.612 0-.889.637-1.613 1.438-1.613.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612Z"/>
                                </svg>
                            </a>
                            <a href="https://github.com/citra-space/citrasense" target="_blank" class="social-link" title="View on GitHub" onclick="event.stopPropagation();">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.012 8.012 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                                </svg>
                            </a>
                        </div>
                    </button>
                </h2>
                <div id="logAccordionCollapse" class="accordion-collapse collapse" aria-labelledby="logAccordionHeader"
                    data-bs-parent="#logAccordion">
                    <div class="accordion-body p-0 log-accordion-body">
                        <!-- Per-sensor filter chips: click to show only that sensor's logs, click "All" to clear. -->
                        <div class="log-filter-bar px-3 pt-2 pb-1 d-flex flex-wrap align-items-center gap-2">
                            <span class="text-muted-dark small">Filter:</span>
                            <button type="button"
                                class="btn btn-sm"
                                :class="$store.citrasense.logSensorFilter === null ? 'btn-primary' : 'btn-outline-secondary'"
                                @click="$store.citrasense.logSensorFilter = null">All</button>
                            <button type="button"
                                class="btn btn-sm"
                                :class="$store.citrasense.logSensorFilter === '__site__' ? 'btn-primary' : 'btn-outline-secondary'"
                                @click="$store.citrasense.logSensorFilter = '__site__'"
                                title="Show only site-level logs (no sensor tag)">Site</button>
                            <template x-for="sensor in $store.citrasense.sensors" :key="sensor.id">
                                <button type="button"
                                    class="btn btn-sm"
                                    :class="$store.citrasense.logSensorFilter === sensor.id ? 'btn-primary' : 'btn-outline-secondary'"
                                    @click="$store.citrasense.logSensorFilter = sensor.id"
                                    x-text="sensor.name || sensor.id"></button>
                            </template>
                        </div>
                        <div class="log-container p-3" id="logContainer" x-ref="logContainer"
                             x-data="{ autoScroll: true }"
                             @scroll="autoScroll = ($el.scrollTop + $el.clientHeight >= $el.scrollHeight - 30)"
                             x-effect="if ($store.citrasense.filteredLogs.length && autoScroll) { $nextTick(() => $el.scrollTop = $el.scrollHeight) }">
                            <p class="text-muted-dark" x-show="$store.citrasense.filteredLogs.length === 0">No logs available</p>
                            <template x-for="log in $store.citrasense.filteredLogs" :key="log._id">
                                <div x-data="logEntry(log)" class="log-entry">
                                    <span class="log-timestamp" x-text="timestamp"></span>
                                    <span class="log-level" :class="levelClass" x-text="log.level"></span>
                                    <span class="log-sensor" x-show="log.sensor_id" x-text="'[' + log.sensor_id + ']'"></span>
                                    <span class="log-module" x-show="log.module && log.module !== 'citrasense'" x-text="'[' + log.module + ']'"></span>
                                    <span class="log-message" x-text="strippedMessage"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
