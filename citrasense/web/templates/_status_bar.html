    <!-- ═══════════════ Global Status Bar ═══════════════ -->
        <div id="globalStatusBar"
             class="d-flex align-items-center flex-wrap gap-2 pb-3 mb-3 border-bottom border-secondary"
             x-effect="$store.citrasense.status && $nextTick(() => { document.querySelectorAll('#globalStatusBar [data-bs-toggle=tooltip]').forEach(el => { try { bootstrap.Tooltip.getOrCreateInstance(el); } catch (_) {} }); })"
             x-data="{
                 get safetyChecks() { return $store.citrasense.status?.safety_status?.checks || []; },
                 get safetyWorst() {
                     const order = ['safe','warn','stop','emergency'];
                     let w = 'safe';
                     for (const c of this.safetyChecks) {
                         if (order.indexOf(c.action) > order.indexOf(w)) w = c.action;
                     }
                     return w;
                 },
                 get safetyWatchdog() { return $store.citrasense.status?.safety_status?.watchdog_alive; },
                 get safetyTip() {
                     if (!this.safetyChecks.length) return 'No safety checks active';
                     const labels = { safe: '\u2713', warn: '\u26A0', stop: '\u23F8', emergency: '\u2716' };
                     const names = { operator_stop: 'Operator Stop', cable_wrap: 'Cable Wrap', disk_space: 'Disk Space', time_health: 'Time Health', hardware_safety: 'Hardware Safety' };
                     let lines = this.safetyChecks.map(c =>
                         (labels[c.action] || '?') + ' ' + (names[c.name] || c.name)
                     );
                     if (this.safetyWatchdog === false) lines.push('\u2716 Watchdog offline');
                     return lines.join('\n');
                 }
             }">

            <!-- Site label: ground-station name (→ Citra app) + Google Maps pin -->
            <span class="d-inline-flex align-items-center gap-1 me-1 fw-semibold">
                <template x-if="$store.citrasense.status?.ground_station_name && $store.citrasense.status?.ground_station_url">
                    <a :href="$store.citrasense.status.ground_station_url" target="_blank" rel="noopener noreferrer"
                       class="ground-station-link"
                       x-text="$store.citrasense.status.ground_station_name + ' \u2197'"></a>
                </template>
                <template x-if="$store.citrasense.status?.ground_station_name && !$store.citrasense.status?.ground_station_url">
                    <span x-text="$store.citrasense.status.ground_station_name"></span>
                </template>
                <template x-if="!$store.citrasense.status?.ground_station_name">
                    <span class="text-muted">&mdash;</span>
                </template>
                <a target="_blank" rel="noopener noreferrer"
                   class="text-body text-decoration-none"
                   x-show="$store.citrasense.status?.location_latitude != null && $store.citrasense.status?.location_longitude != null"
                   :href="'https://www.google.com/maps/search/?api=1&query=' + $store.citrasense.status?.location_latitude + ',' + $store.citrasense.status?.location_longitude"
                   data-bs-toggle="tooltip" data-bs-theme="dark"
                   :data-bs-title="'Open ' + $store.citrasense.formatCompactLocation($store.citrasense.status) + ' in Google Maps'">
                    <i class="bi bi-geo-alt-fill"></i>
                </a>
            </span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  style="white-space:pre-line;" :data-bs-title="safetyTip"
                  x-show="safetyChecks.length > 0"
                  :class="safetyWorst === 'emergency' ? 'bg-danger' : safetyWorst === 'stop' ? 'bg-warning text-dark' : safetyWorst === 'warn' ? 'bg-warning text-dark' : (safetyWatchdog === false ? 'bg-secondary' : 'bg-success')"
                  x-text="safetyWorst === 'emergency' ? 'Emergency' : safetyWorst === 'stop' ? 'Safety: Hold' : safetyWorst === 'warn' ? 'Safety: Warning' : (safetyWatchdog === false ? 'Safety: Offline' : 'Safety: ' + safetyChecks.length + ' OK')"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  style="white-space:pre-line;"
                  x-data="{ now: Date.now(), init() { setInterval(() => this.now = Date.now(), 1000); } }"
                  :data-bs-title="$store.citrasense.wsConnected
                      ? (() => {
                            const stale = $store.citrasense.wsLastMessage > 0 && (now - $store.citrasense.wsLastMessage) > 5000;
                            if (stale) return 'Connected but no data received for ' + Math.round((now - $store.citrasense.wsLastMessage) / 1000) + 's';
                            let tip = 'Connected \u2014 receiving live updates';
                            const ms = $store.citrasense.status?.status_collection_ms;
                            if (ms != null) tip += ' \u00b7 status in ' + ms.toFixed(1) + ' ms';
                            const bd = $store.citrasense.status?.status_collection_breakdown;
                            if (bd) {
                                const sorted = Object.entries(bd).sort((a,b) => b[1] - a[1]);
                                tip += '\n' + sorted.map(([k,v]) => '  ' + k + ': ' + v.toFixed(1) + ' ms').join('\n');
                            }
                            return tip;
                        })()
                      : ($store.citrasense.wsReconnecting
                          ? 'Reconnecting in ' + Math.max(0, Math.ceil(($store.citrasense.wsReconnectAt - now) / 1000)) + 's\u2026'
                          : 'Daemon disconnected')"
                  :class="(() => {
                      if (!$store.citrasense.wsConnected) return $store.citrasense.wsReconnecting ? 'bg-warning text-dark' : 'bg-danger';
                      const stale = $store.citrasense.wsLastMessage > 0 && (now - $store.citrasense.wsLastMessage) > 5000;
                      return stale ? 'bg-warning text-dark' : 'bg-success';
                  })()"
                  x-text="(() => {
                      if ($store.citrasense.wsReconnecting) {
                          const secs = Math.max(0, Math.ceil(($store.citrasense.wsReconnectAt - now) / 1000));
                          return secs > 0 ? 'Reconnecting ' + secs + 's' : 'Reconnecting\u2026';
                      }
                      if (!$store.citrasense.wsConnected) return 'Disconnected';
                      const stale = $store.citrasense.wsLastMessage > 0 && (now - $store.citrasense.wsLastMessage) > 5000;
                      return stale ? 'Degraded' : 'Daemon';
                  })()"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrasense.status?.time_health?.status === 'ok' ? 'Time sync OK' : ($store.citrasense.status?.time_health?.status === 'critical' ? 'Time drift critical' : 'Time sync unknown')"
                  :class="$store.citrasense.status?.time_health?.status === 'ok' ? 'bg-success' : ($store.citrasense.status?.time_health?.status === 'critical' ? 'bg-danger' : 'bg-secondary')"
                  x-text="'Time: ' + $store.citrasense.formatTimeOffset($store.citrasense.status?.time_health)"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="(() => {
                      const s = $store.citrasense.status;
                      const gps = s?.gpsd_fix?.is_strong ? s.gpsd_fix
                                : s?.adapter_gps?.is_strong ? s.adapter_gps
                                : s?.gpsd_fix || s?.adapter_gps;
                      const loc = s?.location_latitude != null;
                      if (gps?.is_strong) return 'GPS fix \u00b7 ' + $store.citrasense.formatCompactLocation(s);
                      if (gps) return 'GPS ' + $store.citrasense.formatGPSLocation(gps) + ' \u00b7 using ' + (s?.ground_station_name || 'ground station');
                      if (loc) return (s?.ground_station_name || 'Ground Station') + ' \u00b7 ' + $store.citrasense.formatCompactLocation(s);
                      return 'No location available';
                  })()"
                  :class="(() => {
                      const s = $store.citrasense.status;
                      const gps = s?.gpsd_fix?.is_strong ? s.gpsd_fix
                                : s?.adapter_gps?.is_strong ? s.adapter_gps
                                : s?.gpsd_fix || s?.adapter_gps;
                      if (gps?.is_strong) return 'bg-success';
                      if (gps) return 'bg-warning text-dark';
                      return 'bg-secondary';
                  })()"
                  x-text="(() => {
                      const s = $store.citrasense.status;
                      const gps = s?.gpsd_fix?.is_strong ? s.gpsd_fix
                                : s?.adapter_gps?.is_strong ? s.adapter_gps
                                : s?.gpsd_fix || s?.adapter_gps;
                      if (gps?.latitude != null) return 'GPS: ' + $store.citrasense.formatGPSLocation(gps);
                      if (gps) return 'GPS: ' + $store.citrasense.formatGPSLocation(gps);
                      const name = s?.ground_station_name;
                      if (name) return 'Loc: ' + name;
                      if (s?.location_latitude != null) return 'Loc: set';
                      return 'Loc: unknown';
                  })()"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  x-show="$store.citrasense.status?.elset_health"
                  :data-bs-title="(() => {
                      const h = $store.citrasense.status?.elset_health;
                      if (!h) return 'TLE cache not loaded';
                      const src = h.source || 'unknown';
                      const ago = h.last_refresh > 0
                          ? Math.round((Date.now() / 1000 - h.last_refresh) / 60) + 'm ago'
                          : 'never';
                      return src + ' \u00b7 refreshed ' + ago;
                  })()"
                  :class="(() => {
                      const c = $store.citrasense.status?.elset_health?.elset_count || 0;
                      if (c >= 25000) return 'bg-success';
                      if (c > 0) return 'bg-warning text-dark';
                      return 'bg-danger';
                  })()"
                  x-text="'TLEs: ' + ($store.citrasense.status?.elset_health?.elset_count || 0).toLocaleString()"></span>

            <!-- E-Stop (right side of pills row) -->
            <button class="btn btn-sm btn-danger ms-auto"
                    x-show="$store.citrasense.wsConnected"
                    @click="$store.citrasense.emergencyStop()"
                    data-bs-toggle="tooltip" data-bs-theme="dark" data-bs-placement="bottom"
                    title="Stop mount, pause tasks, cancel imaging">
                <i class="bi bi-stop-circle-fill"></i> Abort
            </button>

            <!-- Safety alerts (site-level only: operator_stop, disk_space, time_health, hardware_safety) -->
            <div class="w-100"
                 x-data="{ get alerts() {
                     return ($store.citrasense.status?.safety_status?.checks || [])
                         .filter(c => c.action && c.action !== 'safe' && c.name !== 'cable_wrap');
                 }}"
                 x-show="alerts.length > 0">
                <div class="d-flex flex-column gap-2 mt-2">
                    <template x-for="alert in alerts" :key="alert.name">
                        <div class="alert mb-0 d-flex align-items-center py-2"
                             :class="alert.action === 'emergency' ? 'alert-danger' : 'alert-warning'" role="alert">
                            <i class="bi me-2"
                               :class="alert.action === 'emergency' ? 'bi-exclamation-triangle-fill' : 'bi-exclamation-circle-fill'"></i>
                            <span>
                                <strong x-text="alert.action === 'emergency' ? 'EMERGENCY' : (alert.action === 'stop' ? 'Safety Hold' : 'Warning')"></strong>
                                &mdash;
                                <template x-if="alert.name === 'operator_stop'">
                                    <span>Operator stop active &mdash; all motion blocked.
                                        <button class="btn btn-sm btn-outline-light ms-2"
                                                @click="$store.citrasense.clearOperatorStop()">Clear Stop</button>
                                    </span>
                                </template>
                                <template x-if="alert.name === 'disk_space'">
                                    <span>Low disk space
                                        <template x-if="alert.free_mb != null">
                                            (<span x-text="alert.free_mb >= 1000 ? (alert.free_mb / 1000).toFixed(1) + ' GB' : alert.free_mb + ' MB'"></span> free)
                                        </template>
                                        &mdash; <span x-text="alert.action === 'stop' ? 'imaging paused' : 'approaching limit'"></span>.
                                    </span>
                                </template>
                                <template x-if="alert.name === 'time_health'">
                                    <span>System clock drift is critical &mdash; observations may be inaccurate.</span>
                                </template>
                                <template x-if="alert.name === 'hardware_safety'">
                                    <span>External safety monitor reports conditions are <strong>unsafe</strong>.
                                        Telescope operations suspended until conditions improve.</span>
                                </template>
                                <template x-if="!['operator_stop','disk_space','time_health','hardware_safety'].includes(alert.name)">
                                    <span>Safety check "<span x-text="alert.name"></span>" triggered.</span>
                                </template>
                            </span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
