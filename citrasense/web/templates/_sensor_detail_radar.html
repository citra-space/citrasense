{#
    Passive-radar variant of the sensor detail page.  Dispatched from
    ``_sensor_detail.html`` via ``<template x-if="sensor?.type === 'passive_radar'">``.
    Owns its own page header (name + type + radar pills — no
    operational switches, since Scheduling/Robotic/Self-Tasking don't
    map to a streaming receiver).
#}
<div>
    <div class="container my-3">
        <div class="d-flex align-items-center flex-wrap gap-2 mb-3">
            <h1 class="h4 mb-0" x-text="sensor?.name || 'Sensor'"></h1>
            <span class="badge bg-secondary rounded-pill" x-text="sensor?.type"></span>
            {% include "_radar_hardware_pills.html" %}
        </div>

            <div x-data="{
                radar: null,
                radarLoading: false,
                lastError: null,
                lastPing: null,
                stateBadgeClass(state) {
                    if (state === 'running') return 'bg-success';
                    if (state === 'idle') return 'bg-secondary';
                    if (state === 'error') return 'bg-danger';
                    if (state === 'offline') return 'bg-warning text-dark';
                    return 'bg-secondary';
                },
                async refresh() {
                    this.radarLoading = true;
                    try {
                        const url = this.$store.citrasense.sensorApiBaseFor(sensor.id) + '/radar/status';
                        const r = await fetch(url);
                        if (r.ok) { this.radar = await r.json(); }
                    } catch (e) { this.lastError = String(e); }
                    finally { this.radarLoading = false; }
                },
                async radarControl(action, body) {
                    this.lastError = null;
                    try {
                        const url = this.$store.citrasense.sensorApiBaseFor(sensor.id) + '/radar/' + action;
                        const r = await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body || {}) });
                        const data = await r.json();
                        if (!r.ok || data.error) {
                            this.lastError = data.error || ('HTTP ' + r.status);
                        } else if (data.ok === false) {
                            this.lastError = data.error || 'pr_sensor rejected command';
                        } else if (action === 'ping') {
                            this.lastPing = new Date().toISOString();
                        }
                    } catch (e) { this.lastError = String(e); }
                    finally { this.refresh(); }
                },
                init() {
                    this.refresh();
                    this._timer = setInterval(() => this.refresh(), 5000);
                },
                destroy() { if (this._timer) clearInterval(this._timer); },
            }" x-init="init()" x-destroy="destroy()">

                <!-- Header row: state + controls -->
                <div class="card bg-dark text-light border-secondary mb-3">
                    <div class="card-header d-flex flex-wrap align-items-center gap-2">
                        <i class="bi bi-broadcast me-1"></i>
                        <span class="fw-semibold">Passive Radar Engine</span>
                        <span class="badge ms-2"
                              :class="stateBadgeClass(radar?.state)"
                              x-text="radar ? (radar.state || 'unknown') : '…'"></span>
                        <template x-if="radar?.is_stale">
                            <span class="badge bg-warning text-dark" title="No status heartbeat from pr_sensor">stale</span>
                        </template>
                        <div class="ms-md-auto d-flex flex-wrap gap-2">
                            <button class="btn btn-sm btn-outline-success" @click="radarControl('start', {mock: false})">
                                <i class="bi bi-play-fill"></i> Start
                            </button>
                            <button class="btn btn-sm btn-outline-warning" @click="radarControl('start', {mock: true})"
                                    title="Start with synthetic source for bench testing">
                                <i class="bi bi-play"></i> Start mock
                            </button>
                            <button class="btn btn-sm btn-outline-danger" @click="radarControl('stop')">
                                <i class="bi bi-stop-fill"></i> Stop
                            </button>
                            <button class="btn btn-sm btn-outline-info" @click="radarControl('config', {persist: false})">
                                <i class="bi bi-sliders"></i> Push config
                            </button>
                            <button class="btn btn-sm btn-outline-secondary" @click="radarControl('ping')">
                                <i class="bi bi-hdd-network"></i> Ping
                            </button>
                            <template x-if="radar?.pr_control_url">
                                <a :href="radar.pr_control_url" target="_blank" rel="noopener" class="btn btn-sm btn-outline-light">
                                    <i class="bi bi-box-arrow-up-right"></i> pr_control
                                </a>
                            </template>
                        </div>
                    </div>
                    <div class="card-body">
                        <template x-if="lastError">
                            <div class="alert alert-danger py-2 mb-2" x-text="'Last error: ' + lastError"></div>
                        </template>
                        <div class="row g-2">
                            <div class="col-md-4">
                                <div class="fw-semibold">Radar sensor id</div>
                                <div x-text="radar?.radar_sensor_id ?? sensor.id"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="fw-semibold">Streaming</div>
                                <div x-text="radar?.streaming ? 'yes' : 'no'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="fw-semibold">Last status age</div>
                                <div>
                                    <span x-text="radar?.seconds_since_status != null ? (Number(radar.seconds_since_status).toFixed(1) + 's') : '—'"></span>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="fw-semibold">Detection rate</div>
                                <div x-text="radar?.status?.detection_rate ?? '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="fw-semibold">Uptime (s)</div>
                                <div x-text="radar?.status?.uptime_s ?? '—'"></div>
                            </div>
                            <div class="col-md-4">
                                <div class="fw-semibold">Realtime ratio</div>
                                <div x-text="radar?.status?.realtime_ratio ?? '—'"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-3">
                    <!-- Receiver card -->
                    <div class="col-md-6">
                        <div class="card bg-dark text-light border-secondary h-100">
                            <div class="card-header"><i class="bi bi-geo-alt me-1"></i>Receiver</div>
                            <div class="card-body">
                                <div class="row g-2">
                                    <div class="col-6 fw-semibold">Latitude</div>
                                    <div class="col-6" x-text="radar?.status?.receiver?.lat_deg ?? '—'"></div>
                                    <div class="col-6 fw-semibold">Longitude</div>
                                    <div class="col-6" x-text="radar?.status?.receiver?.lon_deg ?? '—'"></div>
                                    <div class="col-6 fw-semibold">Altitude (m)</div>
                                    <div class="col-6" x-text="radar?.status?.receiver?.alt_m ?? '—'"></div>
                                    <div class="col-6 fw-semibold">Antenna UUID</div>
                                    <div class="col-6 text-truncate" :title="radar?.citra_antenna_id"
                                         x-text="radar?.citra_antenna_id ?? '— (not set)'"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Health card -->
                    <div class="col-md-6">
                        <div class="card bg-dark text-light border-secondary h-100">
                            <div class="card-header"><i class="bi bi-activity me-1"></i>Health</div>
                            <div class="card-body">
                                <div class="row g-2">
                                    <div class="col-6 fw-semibold">CPU (%)</div>
                                    <div class="col-6" x-text="radar?.health?.cpu_pct ?? '—'"></div>
                                    <div class="col-6 fw-semibold">RAM (MB)</div>
                                    <div class="col-6" x-text="radar?.health?.ram_mb ?? '—'"></div>
                                    <div class="col-6 fw-semibold">Overflow rate</div>
                                    <div class="col-6" x-text="radar?.health?.overflow_rate ?? '—'"></div>
                                    <div class="col-6 fw-semibold">NATS connected</div>
                                    <div class="col-6" x-text="radar?.health?.nats_connected === true ? 'yes' : (radar?.health?.nats_connected === false ? 'no' : '—')"></div>
                                    <div class="col-6 fw-semibold">Disk free (GB)</div>
                                    <div class="col-6" x-text="radar?.health?.disk_free_gb ?? '—'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Range-Doppler scatter card.  The shared partial fills
                     its container — we give it an explicit height so the
                     SVG has something to stretch into.  The empty-state
                     overlay ("Waiting for first detection…") is handled
                     inside the partial; no need to x-show this card. -->
                <div class="card bg-dark text-light border-secondary my-3">
                    <div class="card-header d-flex align-items-center">
                        <i class="bi bi-radar me-1"></i>
                        <span>Range-Doppler (last 5 min)</span>
                        <span class="ms-auto small text-muted font-monospace"
                              x-effect="$store.citrasense.now"
                              x-text="(() => {
                                  const rate = $store.citrasense.radarDetectionRate(sensor.id, 60);
                                  const n = ($store.citrasense.radarDetections[sensor.id] || []).length;
                                  return n + ' detections · ' + rate.toFixed(2) + ' Hz';
                              })()"></span>
                    </div>
                    <div class="card-body p-2">
                        <div style="height: 360px;">
                            {% with size='full' %}{% include "_radar_range_doppler.html" %}{% endwith %}
                        </div>
                    </div>
                </div>

                <!-- Active Tracks table.  Groups recent detections by
                     ``sat_uuid`` (falling back to ``sat_name`` or
                     "unknown") and surfaces the most-recent values per
                     track plus the per-60s hit count.  Sorted by last
                     update descending so active passes are on top. -->
                <div class="card bg-dark text-light border-secondary my-3"
                     x-data="{
                         get _dets() { return $store.citrasense.radarDetections[sensor.id] || []; },
                         get tracks() {
                             const map = new Map();
                             const nowUnix = $store.citrasense.now / 1000;
                             const oneMinAgo = nowUnix - 60;
                             for (const d of this._dets) {
                                 const key = d.sat_uuid || d.sat_name || 'unknown';
                                 let t = map.get(key);
                                 if (!t) {
                                     t = {
                                         key,
                                         uuid: d.sat_uuid || null,
                                         name: d.sat_name || null,
                                         last: d,
                                         count60: 0,
                                     };
                                     map.set(key, t);
                                 }
                                 if (Number(d.ts_unix || 0) >= Number(t.last.ts_unix || 0)) {
                                     t.last = d;
                                 }
                                 if (Number(d.ts_unix || 0) >= oneMinAgo) {
                                     t.count60++;
                                 }
                             }
                             return Array.from(map.values()).sort(
                                 (a, b) => Number(b.last.ts_unix || 0) - Number(a.last.ts_unix || 0)
                             );
                         },
                         formatAge(ts_unix) {
                             const ts = Number(ts_unix);
                             if (!Number.isFinite(ts)) return '—';
                             const age = Math.max(0, ($store.citrasense.now / 1000) - ts);
                             if (age < 1) return 'just now';
                             if (age < 60) return age.toFixed(0) + 's ago';
                             if (age < 3600) return Math.floor(age / 60) + 'm ' + Math.floor(age % 60) + 's ago';
                             return Math.floor(age / 3600) + 'h ago';
                         },
                         fmt(v, digits) {
                             return v == null ? '—' : Number(v).toFixed(digits);
                         },
                     }"
                     x-effect="$store.citrasense.now"
                     x-show="tracks.length">
                    <div class="card-header">
                        <i class="bi bi-diagram-3 me-1"></i>Active tracks
                        (<span x-text="tracks.length"></span>)
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm table-dark mb-0">
                                <thead>
                                    <tr>
                                        <th>Target</th>
                                        <th class="text-end">Last SNR (dB)</th>
                                        <th class="text-end">Last range (km)</th>
                                        <th class="text-end">Last rate (km/s)</th>
                                        <th class="text-end">Last update</th>
                                        <th class="text-end">Hits/60s</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="t in tracks" :key="t.key">
                                        <tr>
                                            <td>
                                                <div class="fw-semibold"
                                                     x-text="t.name || (t.uuid ? ('UUID ' + t.uuid.substring(0, 8)) : 'unknown')"></div>
                                                <div class="text-muted small text-truncate" style="max-width: 22em;"
                                                     x-text="t.uuid || ''"></div>
                                            </td>
                                            <td class="text-end font-monospace" x-text="fmt(t.last.snr_db, 1)"></td>
                                            <td class="text-end font-monospace" x-text="fmt(t.last.range_km, 1)"></td>
                                            <td class="text-end font-monospace" x-text="fmt(t.last.range_rate_km_s, 3)"></td>
                                            <td class="text-end small text-muted" x-text="formatAge(t.last.ts_unix)"></td>
                                            <td class="text-end font-monospace" x-text="t.count60"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Stations list (collapsible) -->
                <div class="card bg-dark text-light border-secondary my-3"
                     x-show="radar?.stations?.stations?.length">
                    <div class="card-header">
                        <i class="bi bi-broadcast-pin me-1"></i>FM illuminators
                        (<span x-text="(radar?.stations?.stations || []).length"></span>)
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm table-dark mb-0">
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Frequency (Hz)</th>
                                        <th>TX lat</th>
                                        <th>TX lon</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="st in (radar?.stations?.stations || [])" :key="(st.name || '') + '|' + (st.freq_hz || '')">
                                        <tr>
                                            <td x-text="st.name ?? '—'"></td>
                                            <td x-text="st.freq_hz ?? '—'"></td>
                                            <td x-text="st.lat_deg ?? '—'"></td>
                                            <td x-text="st.lon_deg ?? '—'"></td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Last pr_sensor error -->
                <div class="card bg-dark text-light border-danger mb-3" x-show="radar?.error">
                    <div class="card-header text-danger"><i class="bi bi-exclamation-octagon me-1"></i>pr_sensor error</div>
                    <div class="card-body">
                        <pre class="mb-0 small text-danger" x-text="JSON.stringify(radar?.error, null, 2)"></pre>
                    </div>
                </div>
            </div>

    </div> <!-- /container -->
</div> <!-- /radar root -->
