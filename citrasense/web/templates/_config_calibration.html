                    <div x-show="configTab === 'calibration'" class="calibration-pane"

                             calFilterPosition: null,
                             calUploadFrameType: 'flat',
                             calUploadFilter: '',
                             calUploadNormalize: true,
                             calUploadBusy: false,
                             calUploadResult: null,
                             twilightInfo: null,
                             twilightTimer: null,
                             async loadCalStatus() {
                                 try {
                                     const result = await window.citrasenseApi.getCalibrationStatus($store.citrasense.configSensorId);
                                     this.calStatus = result.ok ? result.data : null;
                                 } catch(e) { this.calStatus = null; }

                             async loadTwilight() {
                                 try {
                                     const result = await window.citrasenseApi.getTwilight();
                                     this.twilightInfo = result.ok ? result.data : null;
                                 } catch(e) { this.twilightInfo = null; }
                             },
                             startTwilightPolling() {
                                 if (this.twilightTimer) return;
                                 this.loadTwilight();
                                 this.twilightTimer = setInterval(() => this.loadTwilight(), 60000);
                             },
                             stopTwilightPolling() {
                                 if (this.twilightTimer) { clearInterval(this.twilightTimer); this.twilightTimer = null; }
                             },
                             formatTwilight() {
                                 const t = this.twilightInfo;
                                 if (!t || !t.location_available) return null;
                                 if (t.in_flat_window && t.flat_window) {
                                     return { text: 'Flat window now — ends in ' + Math.round(t.flat_window.remaining_minutes) + 'm', cls: 'text-success' };
                                 }
                                 if (t.next_flat_window) {
                                     const start = new Date(t.next_flat_window.start);
                                     const now = new Date();
                                     const diffMin = Math.round((start - now) / 60000);
                                     const timeStr = start.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
                                     const typeStr = t.next_flat_window.type === 'morning' ? 'Morning' : 'Evening';
                                     if (diffMin < 120) {
                                         return { text: typeStr + ' flat window in ' + diffMin + 'm (' + timeStr + ')', cls: 'text-info' };
                                     }
                                     const hours = Math.floor(diffMin / 60);
                                     const mins = diffMin % 60;
                                     return { text: typeStr + ' flat window in ' + hours + 'h ' + mins + 'm (' + timeStr + ')', cls: 'text-muted' };
                                 }
                                 return { text: 'Sun alt: ' + t.current_sun_altitude + '°', cls: 'text-muted' };
                             },
                             startPolling() {
                                 if (this.calPollTimer) return;
                                 this.calPollTimer = setInterval(async () => {
                                     await this.loadCalStatus();
                                     if (!this.calStatus?.capture_running && !this.calStatus?.capture_requested) {
                                         this.stopPolling();
                                     }
                                 }, 2000);
                             },
                             stopPolling() {
                                 if (this.calPollTimer) { clearInterval(this.calPollTimer); this.calPollTimer = null; }
                             },
                             async captureFrames() {
                                 try {
                                     let body = {
                                         frame_type: this.calFrameType,
                                         count: this.calStatus?.frame_count_setting || 30,
                                         gain: this.calStatus?.current_gain,
                                         binning: this.calStatus?.current_binning,
                                     };
                                     if (this.calFrameType === 'dark' || this.calFrameType === 'flat') {
                                         body.exposure_time = this.calExposure;
                                     }
                                     if (this.calFrameType === 'flat') {
                                         body.filter_position = this.calFilterPosition;
                                     }
                                     await window.citrasenseApi.startCalibrationCapture($store.citrasense.configSensorId, body);
                                     await this.loadCalStatus();
                                     this.startPolling();
                                 } catch(e) { console.error(e); }
                             },
                             async cancelCapture() {
                                 await window.citrasenseApi.cancelCalibrationCapture($store.citrasense.configSensorId);
                             },
                             async captureSuite(suiteName) {
                                 try {
                                     const result = await window.citrasenseApi.startCalibrationSuite($store.citrasense.configSensorId, { suite: suiteName });
                                     if (!result.ok) {
                                         window.showToast(result.error || 'Failed to start suite', 'danger');
                                         return;
                                     }
                                     await this.loadCalStatus();
                                     this.startPolling();
                                 } catch(e) { console.error(e); }
                             },
                             async uploadMaster() {
                                 const input = this.$refs.calUploadFile;
                                 if (!input || !input.files || !input.files[0]) {
                                     this.calUploadResult = { error: 'Select a FITS file first' };
                                     return;
                                 }
                                 const file = input.files[0];
                                 this.calUploadBusy = true;
                                 this.calUploadResult = null;
                                 try {
                                     const sensorId = $store.citrasense.configSensorId;
                                     const qs = new URLSearchParams({
                                         frame_type: this.calUploadFrameType,
                                         normalize_flat: this.calUploadNormalize ? 'true' : 'false',
                                         override_filter: this.calUploadFilter || '',
                                     }).toString();
                                     const result = await window.citrasenseApi.uploadCalibration(sensorId, qs, file);
                                     if (!result.ok) {
                                         this.calUploadResult = { error: result.error || ('Upload failed (' + result.status + ')') };
                                     } else {
                                         this.calUploadResult = result.data;
                                         input.value = '';
                                         await this.loadCalStatus();
                                     }
                                 } catch(e) {
                                     this.calUploadResult = { error: String(e) };
                                 } finally {
                                     this.calUploadBusy = false;
                                 }
                             },
                             async deleteMaster(type, entry) {
                                 if (!confirm('Delete this master frame?')) return;
                                 await window.citrasenseApi.deleteMasterCalibration($store.citrasense.configSensorId, {
                                     frame_type: type,

                                     binning: entry.binning,
                                     exposure_time: entry.exposure_time || 0,
                                     temperature: entry.temperature,
                                     filter_name: entry.filter || '',
                                     read_mode: entry.read_mode || ''
                                 });
                                 this.loadCalStatus();
                             }
                         }"
                         x-init="await loadCalStatus(); if (calStatus?.capture_running || calStatus?.capture_requested) startPolling(); $watch('configTab', v => { if(v === 'calibration') { loadCalStatus(); startTwilightPolling(); } else { stopTwilightPolling(); } }); if (configTab === 'calibration') startTwilightPolling();">

                        <h5 class="mb-3 pb-2 border-bottom border-secondary d-flex align-items-center gap-2">

                                </template>

                                <!-- Upload panel (adapters without direct camera control, e.g. NINA) -->
                                <template x-if="calStatus?.capture_mode === 'upload_only'">
                                    <div>
                                        <h6 class="text-muted mb-2">Upload Master Frame</h6>
                                        <p class="text-muted small mb-3">
                                            Build bias, dark, and flat masters in your capture software
                                            (e.g. NINA's Flat Wizard or dark library) and upload the
                                            resulting FITS file here. CitraSense matches masters to
                                            incoming light frames from the FITS header metadata and
                                            applies them automatically in the processing pipeline.
                                        </p>
                                        <div class="row g-2 align-items-end mb-2">
                                            <div class="col-auto">
                                                <label class="form-label small mb-0">Frame type</label>
                                                <select class="form-select form-select-sm" x-model="calUploadFrameType">
                                                    <option value="bias">Bias</option>
                                                    <option value="dark">Dark</option>
                                                    <option value="flat">Flat</option>
                                                </select>
                                            </div>
                                            <div class="col-auto" x-show="calUploadFrameType === 'flat'">
                                                <label class="form-label small mb-0">Filter (override)</label>
                                                <select class="form-select form-select-sm" style="width: 160px;"
                                                        x-model="calUploadFilter">
                                                    <option value="">From FITS header</option>
                                                    <template x-for="f in (calStatus?.filters || [])" :key="f.name">
                                                        <option :value="f.name" x-text="f.name"></option>
                                                    </template>
                                                </select>
                                            </div>
                                            <div class="col-auto" x-show="calUploadFrameType === 'flat'">
                                                <div class="form-check form-switch mb-1">
                                                    <input class="form-check-input" type="checkbox"
                                                           :id="'calNormFlat-' + ($store.citrasense.configSensorId || 'default')"
                                                           x-model="calUploadNormalize">
                                                    <label class="form-check-label small"
                                                           :for="'calNormFlat-' + ($store.citrasense.configSensorId || 'default')">
                                                        Normalize to median=1
                                                    </label>
                                                </div>
                                            </div>
                                            <div class="col-auto">
                                                <label class="form-label small mb-0">FITS file</label>
                                                <input type="file" class="form-control form-control-sm"
                                                       x-ref="calUploadFile"
                                                       accept=".fits,.fit,.fts,application/fits">
                                            </div>
                                            <div class="col-auto">
                                                <button type="button" class="btn btn-primary btn-sm"
                                                        @click="uploadMaster()"
                                                        :disabled="calUploadBusy">
                                                    <span x-show="!calUploadBusy"><i class="bi bi-upload me-1"></i>Upload</span>
                                                    <span x-show="calUploadBusy">
                                                        <span class="spinner-border spinner-border-sm" role="status"></span>
                                                        Uploading...
                                                    </span>
                                                </button>
                                            </div>
                                        </div>
                                        <small class="text-muted d-block" x-show="calUploadFrameType === 'bias'">
                                            Master bias: shutter-closed, near-zero exposure. Keyed by camera, gain, binning, read mode.
                                        </small>
                                        <small class="text-muted d-block" x-show="calUploadFrameType === 'dark'">
                                            Master dark: shutter-closed at a specific exposure. Keyed by camera, gain, binning, read mode, and exposure + sensor temperature (for dark scaling).
                                        </small>
                                        <small class="text-muted d-block" x-show="calUploadFrameType === 'flat'">
                                            Master flat per filter. Uses the FITS <code>FILTER</code> header unless overridden above.
                                            Normalization divides by the median so the pipeline preserves absolute photometry — leave on unless your master is already normalized.
                                        </small>
                                        <template x-if="calUploadResult">
                                            <div class="mt-3 py-2 px-3 small"
                                                 :class="calUploadResult.error ? 'alert alert-danger mb-0' : 'alert alert-success mb-0'">
                                                <template x-if="calUploadResult.error">
                                                    <span>
                                                        <i class="bi bi-exclamation-triangle-fill me-1"></i>
                                                        <span x-text="calUploadResult.error"></span>
                                                    </span>
                                                </template>
                                                <template x-if="!calUploadResult.error">
                                                    <div>
                                                        <i class="bi bi-check-circle-fill me-1"></i>
                                                        Saved <code x-text="calUploadResult.saved_as"></code>
                                                        <span class="text-muted">for camera</span>
                                                        <code x-text="calUploadResult.camera_id"></code>
                                                        <template x-if="calUploadResult.warnings && calUploadResult.warnings.length">
                                                            <ul class="mb-0 ps-3 mt-1">
                                                                <template x-for="w in calUploadResult.warnings" :key="w">
                                                                    <li x-text="w"></li>
                                                                </template>
                                                            </ul>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </template>

                        <template x-if="calStatus && !calStatus.available">
                            <p class="text-muted">Calibration is not available for the current hardware configuration.</p>
                        </template>

                        <template x-if="!calStatus">
                            <div class="text-center py-3">
                                <div class="spinner-border spinner-border-sm text-secondary" role="status"></div>
                                <small class="text-muted ms-2">Loading calibration status...</small>
                            </div>
                        </template>
                    </div>
