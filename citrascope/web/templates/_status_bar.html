    <!-- ═══════════════ Global Status Bar ═══════════════ -->
        <div id="globalStatusBar"
             class="d-flex align-items-center flex-wrap gap-2 pb-3 mb-3 border-bottom border-secondary"
             x-effect="$store.citrascope.status && $nextTick(() => { document.querySelectorAll('#globalStatusBar [data-bs-toggle=tooltip]').forEach(el => { try { bootstrap.Tooltip.getOrCreateInstance(el); } catch (_) {} }); })"
             x-data="{
                 get safetyChecks() { return $store.citrascope.status?.safety_status?.checks || []; },
                 get safetyWorst() {
                     const order = ['safe','warn','stop','emergency'];
                     let w = 'safe';
                     for (const c of this.safetyChecks) {
                         if (order.indexOf(c.action) > order.indexOf(w)) w = c.action;
                     }
                     return w;
                 },
                 get safetyWatchdog() { return $store.citrascope.status?.safety_status?.watchdog_alive; },
                 get safetyTip() {
                     if (!this.safetyChecks.length) return 'No safety checks active';
                     const labels = { safe: '\u2713', warn: '\u26A0', stop: '\u23F8', emergency: '\u2716' };
                     const names = { operator_stop: 'Operator Stop', cable_wrap: 'Cable Wrap', disk_space: 'Disk Space', time_health: 'Time Health', hardware_safety: 'Hardware Safety' };
                     let lines = this.safetyChecks.map(c =>
                         (labels[c.action] || '?') + ' ' + (names[c.name] || c.name)
                     );
                     if (this.safetyWatchdog === false) lines.push('\u2716 Watchdog offline');
                     return lines.join('\n');
                 }
             }">

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  style="white-space:pre-line;" :data-bs-title="safetyTip"
                  x-show="safetyChecks.length > 0"
                  :class="safetyWorst === 'emergency' ? 'bg-danger' : safetyWorst === 'stop' ? 'bg-warning text-dark' : safetyWorst === 'warn' ? 'bg-warning text-dark' : (safetyWatchdog === false ? 'bg-secondary' : 'bg-success')"
                  x-text="safetyWorst === 'emergency' ? 'Emergency' : safetyWorst === 'stop' ? 'Safety: Hold' : safetyWorst === 'warn' ? 'Safety: Warning' : (safetyWatchdog === false ? 'Safety: Offline' : 'Safety: ' + safetyChecks.length + ' OK')"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  style="white-space:pre-line;"
                  x-data="{ now: Date.now(), init() { setInterval(() => this.now = Date.now(), 1000); } }"
                  :data-bs-title="$store.citrascope.wsConnected
                      ? (() => {
                            const stale = $store.citrascope.wsLastMessage > 0 && (now - $store.citrascope.wsLastMessage) > 5000;
                            if (stale) return 'Connected but no data received for ' + Math.round((now - $store.citrascope.wsLastMessage) / 1000) + 's';
                            let tip = 'Connected \u2014 receiving live updates';
                            const ms = $store.citrascope.status?.status_collection_ms;
                            if (ms != null) tip += ' \u00b7 status in ' + ms.toFixed(1) + ' ms';
                            const bd = $store.citrascope.status?.status_collection_breakdown;
                            if (bd) {
                                const sorted = Object.entries(bd).sort((a,b) => b[1] - a[1]);
                                tip += '\n' + sorted.map(([k,v]) => '  ' + k + ': ' + v.toFixed(1) + ' ms').join('\n');
                            }
                            return tip;
                        })()
                      : ($store.citrascope.wsReconnecting
                          ? 'Reconnecting in ' + Math.max(0, Math.ceil(($store.citrascope.wsReconnectAt - now) / 1000)) + 's\u2026'
                          : 'Daemon disconnected')"
                  :class="(() => {
                      if (!$store.citrascope.wsConnected) return $store.citrascope.wsReconnecting ? 'bg-warning text-dark' : 'bg-danger';
                      const stale = $store.citrascope.wsLastMessage > 0 && (now - $store.citrascope.wsLastMessage) > 5000;
                      return stale ? 'bg-warning text-dark' : 'bg-success';
                  })()"
                  x-text="(() => {
                      if ($store.citrascope.wsReconnecting) {
                          const secs = Math.max(0, Math.ceil(($store.citrascope.wsReconnectAt - now) / 1000));
                          return secs > 0 ? 'Reconnecting ' + secs + 's' : 'Reconnecting\u2026';
                      }
                      if (!$store.citrascope.wsConnected) return 'Disconnected';
                      const stale = $store.citrascope.wsLastMessage > 0 && (now - $store.citrascope.wsLastMessage) > 5000;
                      return stale ? 'Degraded' : 'Daemon';
                  })()"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  style="white-space:pre-line;"
                  :data-bs-title="$store.citrascope.telescopeTooltip()"
                  :class="$store.citrascope.status?.telescope_connected ? 'bg-success' : 'bg-danger'">Telescope</span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="(() => {
                      let s = $store.citrascope.status;
                      if (!s?.camera_connected) return 'Camera disconnected';
                      let tip = 'Camera connected';
                      if (s.camera_temperature != null) tip += ' \u00b7 ' + s.camera_temperature.toFixed(1) + ' \u00b0C';
                      let cal = s.calibration_status;
                      if (cal && cal.calibration_applicable) {
                          if (cal.has_bias && cal.has_dark && cal.has_flat) tip += ' \u00b7 Calibrated';
                          else if (cal.missing_summary) tip += ' \u00b7 Missing: ' + cal.missing_summary;
                          else tip += ' \u00b7 Uncalibrated';
                      }
                      return tip;
                  })()"
                  :class="(() => {
                      let s = $store.citrascope.status;
                      if (!s?.camera_connected) return 'bg-danger';
                      let cal = s.calibration_status;
                      if (cal && cal.calibration_applicable) {
                          if (cal.has_bias && cal.has_dark && cal.has_flat) return 'bg-success';
                          return 'bg-warning text-dark';
                      }
                      return 'bg-success';
                  })()"
                  x-text="$store.citrascope.status?.camera_connected && $store.citrascope.status?.camera_temperature != null
                      ? 'Camera ' + $store.citrascope.status.camera_temperature.toFixed(1) + '\u00b0C'
                      : 'Camera'"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrascope.status?.focuser_connected
                      ? ('Focuser connected' + ($store.citrascope.status?.focuser_temperature != null ? ' \u00b7 ' + $store.citrascope.status.focuser_temperature.toFixed(1) + ' \u00b0C' : ''))
                      : 'No focuser'"
                  :class="$store.citrascope.status?.focuser_connected ? 'bg-success' : 'bg-secondary'"
                  x-text="$store.citrascope.status?.focuser_connected && $store.citrascope.status?.focuser_temperature != null
                      ? 'Focuser ' + $store.citrascope.status.focuser_temperature.toFixed(1) + '\u00b0C'
                      : 'Focuser'"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrascope.status?.time_health?.status === 'ok' ? 'Time sync OK' : ($store.citrascope.status?.time_health?.status === 'critical' ? 'Time drift critical' : 'Time sync unknown')"
                  :class="$store.citrascope.status?.time_health?.status === 'ok' ? 'bg-success' : ($store.citrascope.status?.time_health?.status === 'critical' ? 'bg-danger' : 'bg-secondary')"
                  x-text="'Time: ' + $store.citrascope.formatTimeOffset($store.citrascope.status?.time_health)"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="(() => {
                      const s = $store.citrascope.status;
                      const gps = s?.gpsd_fix?.is_strong ? s.gpsd_fix
                                : s?.adapter_gps?.is_strong ? s.adapter_gps
                                : s?.gpsd_fix || s?.adapter_gps;
                      const loc = s?.location_latitude != null;
                      if (gps?.is_strong) return 'GPS fix \u00b7 ' + $store.citrascope.formatCompactLocation(s);
                      if (gps) return 'GPS ' + $store.citrascope.formatGPSLocation(gps) + ' \u00b7 using ' + (s?.ground_station_name || 'ground station');
                      if (loc) return (s?.ground_station_name || 'Ground Station') + ' \u00b7 ' + $store.citrascope.formatCompactLocation(s);
                      return 'No location available';
                  })()"
                  :class="(() => {
                      const s = $store.citrascope.status;
                      const gps = s?.gpsd_fix?.is_strong ? s.gpsd_fix
                                : s?.adapter_gps?.is_strong ? s.adapter_gps
                                : s?.gpsd_fix || s?.adapter_gps;
                      if (gps?.is_strong) return 'bg-success';
                      if (gps) return 'bg-warning text-dark';
                      return 'bg-secondary';
                  })()"
                  x-text="(() => {
                      const s = $store.citrascope.status;
                      const gps = s?.gpsd_fix?.is_strong ? s.gpsd_fix
                                : s?.adapter_gps?.is_strong ? s.adapter_gps
                                : s?.gpsd_fix || s?.adapter_gps;
                      if (gps?.latitude != null) return 'GPS: ' + $store.citrascope.formatGPSLocation(gps);
                      if (gps) return 'GPS: ' + $store.citrascope.formatGPSLocation(gps);
                      const name = s?.ground_station_name;
                      if (name) return 'Loc: ' + name;
                      if (s?.location_latitude != null) return 'Loc: set';
                      return 'Loc: unknown';
                  })()"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  x-show="$store.citrascope.status?.elset_health"
                  :data-bs-title="(() => {
                      const h = $store.citrascope.status?.elset_health;
                      if (!h) return 'TLE cache not loaded';
                      const src = h.source || 'unknown';
                      const ago = h.last_refresh > 0
                          ? Math.round((Date.now() / 1000 - h.last_refresh) / 60) + 'm ago'
                          : 'never';
                      return src + ' \u00b7 refreshed ' + ago;
                  })()"
                  :class="(() => {
                      const c = $store.citrascope.status?.elset_health?.elset_count || 0;
                      if (c >= 25000) return 'bg-success';
                      if (c > 0) return 'bg-warning text-dark';
                      return 'bg-danger';
                  })()"
                  x-text="'TLEs: ' + ($store.citrascope.status?.elset_health?.elset_count || 0).toLocaleString()"></span>

            <!-- E-Stop (right side of pills row) -->
            <button class="btn btn-sm btn-danger ms-auto"
                    x-show="$store.citrascope.wsConnected"
                    @click="emergencyStop()"
                    data-bs-toggle="tooltip" data-bs-theme="dark" data-bs-placement="bottom"
                    title="Stop mount, pause tasks, cancel imaging">
                <i class="bi bi-stop-circle-fill"></i> Abort
            </button>

            <!-- Switches row (full-width, left-aligned, wraps on mobile) -->
            <div class="w-100 d-flex flex-wrap align-items-center gap-2 gap-md-3 mt-1">
                <div class="d-flex align-items-center gap-1"
                     data-bs-toggle="tooltip" data-bs-theme="dark"
                     title="Automated scheduling — server assigns tasks to this telescope">
                    <small class="text-muted text-nowrap">Scheduling</small>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox"
                               :checked="$store.citrascope.status?.automated_scheduling"
                               @change="$store.citrascope.toggleAutomatedScheduling($event.target.checked)">
                    </div>
                </div>
                <div class="d-flex align-items-center gap-1"
                     data-bs-toggle="tooltip" data-bs-theme="dark"
                     title="Task processing — daemon executes queued tasks">
                    <small class="text-muted text-nowrap">Processing</small>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox"
                               :checked="$store.citrascope.status?.processing_active !== false"
                               @change="$store.citrascope.toggleProcessing($event.target.checked)">
                    </div>
                </div>
                <div class="d-flex align-items-center gap-1"
                     data-bs-toggle="tooltip" data-bs-theme="dark"
                     title="Robotic session — park/unpark and autofocus at dusk/dawn">
                    <small class="text-muted text-nowrap">Robotic</small>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox"
                               :checked="$store.citrascope.status?.observing_session_enabled"
                               @change="$store.citrascope.toggleObservingSession($event.target.checked)">
                    </div>
                </div>
                <div class="d-flex align-items-center gap-1"
                     data-bs-toggle="tooltip" data-bs-theme="dark"
                     title="Self-tasking — automatically request work when dark">
                    <small class="text-muted text-nowrap">Self-Tasking</small>
                    <div class="form-check form-switch mb-0">
                        <input class="form-check-input" type="checkbox"
                               :checked="$store.citrascope.status?.self_tasking_enabled"
                               @change="$store.citrascope.toggleSelfTasking($event.target.checked)">
                    </div>
                </div>
                <span class="badge rounded-pill bg-warning text-dark"
                      style="display:inline-flex; align-items:center;"
                      x-show="$store.citrascope.status?.self_tasking_enabled
                          && (!$store.citrascope.status?.observing_session_enabled
                              || !$store.citrascope.status?.automated_scheduling
                              || $store.citrascope.status?.processing_active === false)"
                      data-bs-toggle="tooltip" data-bs-theme="dark"
                      :data-bs-title="(() => {
                          const s = $store.citrascope.status;
                          if (!s) return '';
                          const issues = [];
                          if (!s.observing_session_enabled) issues.push('Robotic session is off \u2014 no night lifecycle');
                          if (!s.automated_scheduling) issues.push('Scheduling is off \u2014 server won\u2019t assign tasks');
                          if (s.processing_active === false) issues.push('Processing is off \u2014 tasks won\u2019t execute');
                          return issues.join('\n');
                      })()"><i class="bi bi-exclamation-triangle-fill"></i></span>
            </div>

            <!-- Safety alerts — shown when any check is non-safe -->
            <div class="w-100"
                 x-data="{ get alerts() {
                     return ($store.citrascope.status?.safety_status?.checks || []).filter(c => c.action && c.action !== 'safe');
                 }}"
                 x-show="alerts.length > 0">
                <div class="d-flex flex-column gap-2 mt-2">
                    <template x-for="alert in alerts" :key="alert.name">
                        <div class="alert mb-0 d-flex align-items-center py-2"
                             :class="alert.action === 'emergency' ? 'alert-danger' : 'alert-warning'" role="alert">
                            <i class="bi me-2"
                               :class="alert.action === 'emergency' ? 'bi-exclamation-triangle-fill' : 'bi-exclamation-circle-fill'"></i>
                            <span>
                                <strong x-text="alert.action === 'emergency' ? 'EMERGENCY' : (alert.action === 'stop' ? 'Safety Hold' : 'Warning')"></strong>
                                &mdash;
                                <template x-if="alert.name === 'operator_stop'">
                                    <span>Operator stop active &mdash; all motion blocked.
                                        <button class="btn btn-sm btn-outline-light ms-2"
                                                @click="clearOperatorStop()">Clear Stop</button>
                                    </span>
                                </template>
                                <template x-if="alert.name === 'cable_wrap'">
                                    <span>Cable wrap at <span x-text="Math.abs(alert.cumulative_deg ?? 0)"></span>&deg;
                                        (<span x-text="alert.action === 'emergency' ? 'hard limit' : 'soft limit'"></span> reached).
                                        <template x-if="alert.unwinding">
                                            <span class="fw-semibold">Unwinding in progress...</span>
                                        </template>
                                    </span>
                                </template>
                                <template x-if="alert.name === 'disk_space'">
                                    <span>Low disk space
                                        <template x-if="alert.free_mb != null">
                                            (<span x-text="alert.free_mb >= 1000 ? (alert.free_mb / 1000).toFixed(1) + ' GB' : alert.free_mb + ' MB'"></span> free)
                                        </template>
                                        &mdash; <span x-text="alert.action === 'stop' ? 'imaging paused' : 'approaching limit'"></span>.
                                    </span>
                                </template>
                                <template x-if="alert.name === 'time_health'">
                                    <span>System clock drift is critical &mdash; observations may be inaccurate.</span>
                                </template>
                                <template x-if="alert.name === 'hardware_safety'">
                                    <span>External safety monitor reports conditions are <strong>unsafe</strong>.
                                        Telescope operations suspended until conditions improve.</span>
                                </template>
                                <template x-if="!['operator_stop','cable_wrap','disk_space','time_health','hardware_safety'].includes(alert.name)">
                                    <span>Safety check "<span x-text="alert.name"></span>" triggered.</span>
                                </template>
                            </span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
