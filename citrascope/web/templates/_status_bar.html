    <!-- ═══════════════ Global Status Bar ═══════════════ -->
        <div id="globalStatusBar"
             class="d-flex align-items-center flex-wrap gap-2 pb-3 mb-3 border-bottom border-secondary"
             x-effect="$store.citrascope.status && $nextTick(() => { document.querySelectorAll('#globalStatusBar [data-bs-toggle=tooltip]').forEach(el => { try { bootstrap.Tooltip.getOrCreateInstance(el); } catch (_) {} }); })"
             x-data="{
                 get safetyChecks() { return $store.citrascope.status?.safety_status?.checks || []; },
                 get safetyWorst() {
                     const order = ['safe','warn','stop','emergency'];
                     let w = 'safe';
                     for (const c of this.safetyChecks) {
                         if (order.indexOf(c.action) > order.indexOf(w)) w = c.action;
                     }
                     return w;
                 },
                 get safetyWatchdog() { return $store.citrascope.status?.safety_status?.watchdog_alive; },
                 get safetyTip() {
                     if (!this.safetyChecks.length) return 'No safety checks active';
                     const labels = { safe: '\u2713', warn: '\u26A0', stop: '\u23F8', emergency: '\u2716' };
                     const names = { operator_stop: 'Operator Stop', cable_wrap: 'Cable Wrap', disk_space: 'Disk Space', time_health: 'Time Health' };
                     let lines = this.safetyChecks.map(c =>
                         (labels[c.action] || '?') + ' ' + (names[c.name] || c.name)
                     );
                     if (this.safetyWatchdog === false) lines.push('\u2716 Watchdog offline');
                     return lines.join('\n');
                 }
             }">

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  style="white-space:pre-line;" :data-bs-title="safetyTip"
                  x-show="safetyChecks.length > 0"
                  :class="safetyWorst === 'emergency' ? 'bg-danger' : safetyWorst === 'stop' ? 'bg-warning text-dark' : safetyWorst === 'warn' ? 'bg-warning text-dark' : (safetyWatchdog === false ? 'bg-secondary' : 'bg-success')"
                  x-text="safetyWorst === 'emergency' ? 'Emergency' : safetyWorst === 'stop' ? 'Safety: Hold' : safetyWorst === 'warn' ? 'Safety: Warning' : (safetyWatchdog === false ? 'Safety: Offline' : 'Safety: ' + safetyChecks.length + ' OK')"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrascope.wsConnected ? 'Connected \u2014 receiving live updates' : ($store.citrascope.wsReconnecting ? 'Reconnecting\u2026' : 'Daemon disconnected')"
                  :class="$store.citrascope.wsConnected ? 'bg-success' : ($store.citrascope.wsReconnecting ? 'bg-warning text-dark' : 'bg-danger')"
                  x-text="$store.citrascope.wsReconnecting ? 'Reconnecting' : 'Daemon'"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrascope.status?.telescope_connected ? 'Telescope connected' : 'Telescope disconnected'"
                  :class="$store.citrascope.status?.telescope_connected ? 'bg-success' : 'bg-danger'">Telescope</span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="(() => {
                      let s = $store.citrascope.status;
                      if (!s?.camera_connected) return 'Camera disconnected';
                      let tip = 'Camera connected';
                      if (s.camera_temperature != null) tip += ' \u00b7 ' + s.camera_temperature.toFixed(1) + ' \u00b0C';
                      let cal = s.calibration_status;
                      if (cal && cal.calibration_applicable) {
                          if (cal.has_bias && cal.has_dark && cal.has_flat) tip += ' \u00b7 Calibrated';
                          else if (cal.missing_summary) tip += ' \u00b7 Missing: ' + cal.missing_summary;
                          else tip += ' \u00b7 Uncalibrated';
                      }
                      return tip;
                  })()"
                  :class="(() => {
                      let s = $store.citrascope.status;
                      if (!s?.camera_connected) return 'bg-danger';
                      let cal = s.calibration_status;
                      if (cal && cal.calibration_applicable) {
                          if (cal.has_bias && cal.has_dark && cal.has_flat) return 'bg-success';
                          return 'bg-warning text-dark';
                      }
                      return 'bg-success';
                  })()"
                  x-text="$store.citrascope.status?.camera_connected && $store.citrascope.status?.camera_temperature != null
                      ? 'Camera ' + $store.citrascope.status.camera_temperature.toFixed(1) + '\u00b0C'
                      : 'Camera'"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrascope.status?.focuser_connected
                      ? ('Focuser connected' + ($store.citrascope.status?.focuser_temperature != null ? ' \u00b7 ' + $store.citrascope.status.focuser_temperature.toFixed(1) + ' \u00b0C' : ''))
                      : 'No focuser'"
                  :class="$store.citrascope.status?.focuser_connected ? 'bg-success' : 'bg-secondary'"
                  x-text="$store.citrascope.status?.focuser_connected && $store.citrascope.status?.focuser_temperature != null
                      ? 'Focuser ' + $store.citrascope.status.focuser_temperature.toFixed(1) + '\u00b0C'
                      : 'Focuser'"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="$store.citrascope.status?.time_health?.status === 'ok' ? 'Time sync OK' : ($store.citrascope.status?.time_health?.status === 'critical' ? 'Time drift critical' : 'Time sync unknown')"
                  :class="$store.citrascope.status?.time_health?.status === 'ok' ? 'bg-success' : ($store.citrascope.status?.time_health?.status === 'critical' ? 'bg-danger' : 'bg-secondary')"
                  x-text="'Time: ' + $store.citrascope.formatTimeOffset($store.citrascope.status?.time_health)"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  :data-bs-title="(() => {
                      const s = $store.citrascope.status;
                      const gpsOn = $store.citrascope.config?.gps_location_updates_enabled !== false;
                      const gps = s?.gps_location;
                      const loc = s?.location_latitude != null;
                      if (gpsOn && gps?.is_strong) return 'GPS fix \u00b7 ' + $store.citrascope.formatCompactLocation(s);
                      if (gpsOn && gps) return 'GPS ' + $store.citrascope.formatGPSLocation(gps) + ' \u00b7 using ' + (s?.ground_station_name || 'ground station');
                      if (gpsOn) return 'GPS not detected \u00b7 using ' + (s?.ground_station_name || 'ground station');
                      if (loc) return (s?.ground_station_name || 'Ground Station') + ' \u00b7 ' + $store.citrascope.formatCompactLocation(s);
                      return 'No location available';
                  })()"
                  :class="(() => {
                      const gpsOn = $store.citrascope.config?.gps_location_updates_enabled !== false;
                      const gps = $store.citrascope.status?.gps_location;
                      if (gpsOn && gps?.is_strong) return 'bg-success';
                      if (gpsOn && gps) return 'bg-warning text-dark';
                      return 'bg-secondary';
                  })()"
                  x-text="(() => {
                      const gpsOn = $store.citrascope.config?.gps_location_updates_enabled !== false;
                      const gps = $store.citrascope.status?.gps_location;
                      if (gpsOn && gps?.latitude != null) return 'GPS: ' + $store.citrascope.formatGPSLocation(gps);
                      if (gpsOn && gps) return 'GPS: ' + $store.citrascope.formatGPSLocation(gps);
                      if (gpsOn) return 'GPS: Not detected';
                      const name = $store.citrascope.status?.ground_station_name;
                      if (name) return 'Loc: ' + name;
                      if ($store.citrascope.status?.location_latitude != null) return 'Loc: set';
                      return 'Loc: unknown';
                  })()"></span>

            <span class="badge rounded-pill"
                  data-bs-toggle="tooltip" data-bs-theme="dark"
                  x-show="$store.citrascope.status?.elset_health"
                  :data-bs-title="(() => {
                      const h = $store.citrascope.status?.elset_health;
                      if (!h) return 'TLE cache not loaded';
                      const src = h.source || 'unknown';
                      const ago = h.last_refresh > 0
                          ? Math.round((Date.now() / 1000 - h.last_refresh) / 60) + 'm ago'
                          : 'never';
                      return src + ' \u00b7 refreshed ' + ago;
                  })()"
                  :class="(() => {
                      const c = $store.citrascope.status?.elset_health?.elset_count || 0;
                      if (c >= 25000) return 'bg-success';
                      if (c > 0) return 'bg-warning text-dark';
                      return 'bg-danger';
                  })()"
                  x-text="'TLEs: ' + ($store.citrascope.status?.elset_health?.elset_count || 0).toLocaleString()"></span>

            <!-- Right side: toggles + E-Stop -->
            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="d-flex flex-column flex-md-row align-items-end align-items-md-center gap-1">
                    <div class="d-flex align-items-center gap-1"
                         data-bs-toggle="tooltip" data-bs-theme="dark"
                         title="Automated scheduling — server assigns tasks to this telescope">
                        <small class="text-muted text-nowrap">Scheduling</small>
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox"
                                   :checked="$store.citrascope.status?.automated_scheduling"
                                   @change="$store.citrascope.toggleAutomatedScheduling($event.target.checked)">
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-1"
                         data-bs-toggle="tooltip" data-bs-theme="dark"
                         title="Task processing — daemon executes queued tasks">
                        <small class="text-muted text-nowrap">Processing</small>
                        <div class="form-check form-switch mb-0">
                            <input class="form-check-input" type="checkbox"
                                   :checked="$store.citrascope.status?.processing_active !== false"
                                   @change="$store.citrascope.toggleProcessing($event.target.checked)">
                        </div>
                    </div>
                </div>
                <button class="btn btn-sm btn-danger"
                        x-show="$store.citrascope.wsConnected"
                        @click="emergencyStop()"
                        data-bs-toggle="tooltip" data-bs-theme="dark" data-bs-placement="bottom"
                        title="Stop mount, pause tasks, cancel imaging">
                    <i class="bi bi-stop-circle-fill"></i> Abort
                </button>
            </div>
        </div>
